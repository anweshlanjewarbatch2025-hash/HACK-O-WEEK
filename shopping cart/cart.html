<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cart — Linked List</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0d0f;
    --surface:  #141417;
    --surface2: #1c1c21;
    --border:   #2a2a32;
    --accent:   #00e5a0;
    --accent2:  #ff6b35;
    --head-c:   #00e5a0;
    --tail-c:   #ff6b35;
    --text:     #f0f0f0;
    --muted:    #666676;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  html { background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { min-height: 100vh; padding: 0; overflow-x: hidden; }

  /* ── grid layout ── */
  .page { display: grid; grid-template-columns: 1fr 360px; grid-template-rows: auto 1fr; min-height: 100vh; }
  .header { grid-column: 1 / -1; padding: 28px 40px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 20px; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
  .header h1 span { color: var(--accent); }
  .header .tag { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--surface2); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); }

  /* ── left panel ── */
  .left { padding: 32px 40px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 32px; }

  /* add form */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .form-card h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  .fields { display: grid; grid-template-columns: 1fr 100px 72px; gap: 10px; margin-bottom: 12px; }
  .fields input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-family: var(--sans); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; }
  .fields input:focus { border-color: var(--accent); }
  .fields input::placeholder { color: var(--muted); }
  .btns { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 11px; font-family: var(--sans); font-size: 13px; font-weight: 700; letter-spacing: 0.04em; border-radius: 8px; border: none; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
  .btn:active { transform: scale(0.97); }
  .btn-head { background: var(--head-c); color: #000; }
  .btn-head:hover { opacity: 0.85; }
  .btn-tail { background: var(--tail-c); color: #fff; }
  .btn-tail:hover { opacity: 0.85; }

  /* visualizer */
  .vis-section h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .vis-track { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; min-height: 64px; }
  .v-node { display: flex; align-items: center; gap: 6px; animation: nodePop 0.28s cubic-bezier(.34,1.56,.64,1); }
  @keyframes nodePop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .v-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; min-width: 80px; position: relative; }
  .v-box.is-head { border-color: var(--head-c); }
  .v-box.is-tail { border-color: var(--tail-c); }
  .v-badge { font-family: var(--mono); font-size: 9px; font-weight: 500; padding: 1px 5px; border-radius: 3px; position: absolute; top: -9px; left: 8px; }
  .v-badge.head { background: var(--head-c); color: #000; }
  .v-badge.tail { background: var(--tail-c); color: #fff; }
  .v-id { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .v-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .v-ptr { font-family: var(--mono); font-size: 18px; color: var(--muted); }
  .v-null { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .vis-empty { font-family: var(--mono); font-size: 13px; color: var(--muted); }

  /* log */
  .log-bar { font-family: var(--mono); font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; line-height: 1.5; }
  .log-bar .ok  { color: var(--accent); }
  .log-bar .err { color: var(--accent2); }
  .log-bar .ptr { color: #7eb8ff; }

  /* ── right panel — cart table ── */
  .right { padding: 32px 28px; display: flex; flex-direction: column; gap: 24px; background: var(--surface); }
  .right h2 { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

  .cart-list { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .cart-item { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.22s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  .ci-id { font-family: var(--mono); font-size: 11px; color: var(--muted); min-width: 28px; }
  .ci-info { flex: 1; }
  .ci-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .ci-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ci-sub { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); min-width: 72px; text-align: right; }
  .ci-del { width: 28px; height: 28px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s; }
  .ci-del:hover { border-color: var(--accent2); color: var(--accent2); }
  .empty-cart { font-family: var(--mono); font-size: 13px; color: var(--muted); text-align: center; padding: 32px 0; }

  /* remove by id */
  .remove-form { display: flex; gap: 8px; }
  .remove-form input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; }
  .remove-form input:focus { border-color: var(--accent2); }
  .remove-form button { padding: 9px 16px; background: var(--accent2); color: #fff; border: none; border-radius: 8px; font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer; }
  .remove-form button:hover { opacity: 0.85; }

  /* summary */
  .summary { border-top: 1px solid var(--border); padding-top: 20px; }
  .summary-row { display: flex; justify-content: space-between; align-items: baseline; }
  .summary-row .lbl { font-size: 13px; color: var(--muted); }
  .summary-row .val { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .summary-total { display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; }
  .summary-total .lbl { font-size: 15px; font-weight: 700; }
  .summary-total .val { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--accent); }

  @media (max-width: 820px) {
    .page { grid-template-columns: 1fr; }
    .left { border-right: none; border-bottom: 1px solid var(--border); padding: 24px 20px; }
    .right { padding: 24px 20px; }
    .header { padding: 20px; }
    .fields { grid-template-columns: 1fr 90px 64px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <h1>Cart<span>.</span>DS</h1>
    <span class="tag">Dynamic Linked List</span>
    <span class="tag">O(1) insert · O(n) remove</span>
  </header>

  <!-- LEFT: controls + visualiser -->
  <main class="left">

    <div class="form-card">
      <h2>Add Item</h2>
      <div class="fields">
        <input id="iName"  placeholder="Item name" />
        <input id="iPrice" type="number" placeholder="Price" min="0" step="0.01" />
        <input id="iQty"   type="number" placeholder="Qty"   min="1" value="1" />
      </div>
      <div class="btns">
        <button class="btn btn-head" onclick="addItem('head')">↑ Insert Head</button>
        <button class="btn btn-tail" onclick="addItem('tail')">↓ Insert Tail</button>
      </div>
    </div>

    <div class="vis-section">
      <h2>Linked List Structure</h2>
      <div class="vis-track" id="visTrack">
        <span class="vis-empty">HEAD → NULL</span>
      </div>
    </div>

    <div class="log-bar" id="logBar">Ready. Add an item to begin.</div>

  </main>

  <!-- RIGHT: cart -->
  <aside class="right">
    <h2>Cart Items</h2>

    <div class="remove-form">
      <input id="rId" type="number" placeholder="Remove by ID..." />
      <button onclick="removeById()">Remove</button>
    </div>

    <div class="cart-list" id="cartList">
      <div class="empty-cart">Your cart is empty</div>
    </div>

    <div class="summary">
      <div class="summary-row">
        <span class="lbl">Nodes</span>
        <span class="val" id="sizeVal">0</span>
      </div>
      <div class="summary-row" style="margin-top:6px">
        <span class="lbl">Total items</span>
        <span class="val" id="qtyVal">0</span>
      </div>
      <div class="summary-total">
        <span class="lbl">Total</span>
        <span class="val" id="totalVal">₹0.00</span>
      </div>
    </div>
  </aside>

</div>

<script>
// ── Linked List Engine ────────────────────────────────────────────────────────
class CartNode {
  constructor(id, name, qty, price) {
    this.id = id; this.name = name; this.qty = qty; this.price = price;
    this.next = null;
  }
}
class LinkedList {
  constructor() { this.head = null; this.tail = null; this.size = 0; }

  insertAtHead(node) {
    if (!this.head) { this.head = this.tail = node; }
    else { node.next = this.head; this.head = node; }
    this.size++;
    return `<span class="ok">HEAD INSERT</span> <span class="ptr">#${node.id}</span> "${node.name}" → head:<span class="ptr">#${this.head.id}</span>  tail:<span class="ptr">#${this.tail.id}</span>  size:${this.size}`;
  }

  insertAtTail(node) {
    if (!this.tail) { this.head = this.tail = node; }
    else { this.tail.next = node; this.tail = node; }
    this.size++;
    return `<span class="ok">TAIL INSERT</span> <span class="ptr">#${node.id}</span> "${node.name}" → head:<span class="ptr">#${this.head.id}</span>  tail:<span class="ptr">#${this.tail.id}</span>  size:${this.size}`;
  }

  removeById(id) {
    if (!this.head) return `<span class="err">ERROR</span> List is empty.`;
    if (this.head.id === id) {
      const n = this.head;
      this.head === this.tail ? (this.head = this.tail = null) : (this.head = this.head.next);
      this.size--;
      return `<span class="ok">REMOVE</span> <span class="ptr">#${n.id}</span> "${n.name}" (was head) → size:${this.size}`;
    }
    let prev = this.head, cur = this.head.next;
    while (cur) {
      if (cur.id === id) {
        prev.next = cur.next;
        if (cur === this.tail) this.tail = prev;
        this.size--;
        return `<span class="ok">REMOVE</span> <span class="ptr">#${cur.id}</span> "${cur.name}" → size:${this.size}`;
      }
      prev = cur; cur = cur.next;
    }
    return `<span class="err">NOT FOUND</span> No node with ID <span class="ptr">#${id}</span>.`;
  }

  toArray() {
    const a = []; let c = this.head;
    while (c) { a.push(c); c = c.next; }
    return a;
  }
}

const cart = new LinkedList();
let nextId = 1;

function log(msg) { document.getElementById('logBar').innerHTML = msg; }

function addItem(pos) {
  const name  = document.getElementById('iName').value.trim();
  const price = parseFloat(document.getElementById('iPrice').value);
  const qty   = parseInt(document.getElementById('iQty').value) || 1;
  if (!name || isNaN(price) || price < 0) {
    log(`<span class="err">ERROR</span> Enter a valid name and price.`); return;
  }
  const node = new CartNode(nextId++, name, qty, price);
  const msg  = pos === 'head' ? cart.insertAtHead(node) : cart.insertAtTail(node);
  log(msg);
  document.getElementById('iName').value  = '';
  document.getElementById('iPrice').value = '';
  document.getElementById('iQty').value   = '1';
  render();
}

function removeById() {
  const id = parseInt(document.getElementById('rId').value);
  if (isNaN(id)) { log(`<span class="err">ERROR</span> Enter a valid ID.`); return; }
  log(cart.removeById(id));
  document.getElementById('rId').value = '';
  render();
}

function removeByIdDirect(id) {
  log(cart.removeById(id));
  render();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const arr = cart.toArray();

  // Visualiser
  const vt = document.getElementById('visTrack');
  if (!arr.length) {
    vt.innerHTML = '<span class="vis-empty">HEAD → NULL</span>';
  } else {
    vt.innerHTML = arr.map((n, i) => {
      const isHead = i === 0, isTail = i === arr.length - 1;
      let badges = '';
      if (isHead) badges += '<span class="v-badge head">HEAD</span>';
      if (isTail) badges += `<span class="v-badge tail" style="left:${isHead?52:8}px">TAIL</span>`;
      const boxClass = isHead && isTail ? 'v-box is-head is-tail' : isHead ? 'v-box is-head' : isTail ? 'v-box is-tail' : 'v-box';
      const arrow = i < arr.length - 1 ? '<span class="v-ptr">→</span>' : '';
      return `<div class="v-node">
        <div class="${boxClass}">
          ${badges}
          <div class="v-id">#${n.id}</div>
          <div class="v-name">${esc(n.name)}</div>
        </div>${arrow}
      </div>`;
    }).join('') + '<span class="v-null"> → NULL</span>';
  }

  // Cart list
  const cl = document.getElementById('cartList');
  if (!arr.length) {
    cl.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
  } else {
    cl.innerHTML = arr.map(n => {
      const sub = (n.price * n.qty).toFixed(2);
      return `<div class="cart-item">
        <span class="ci-id">#${n.id}</span>
        <div class="ci-info">
          <div class="ci-name">${esc(n.name)}</div>
          <div class="ci-meta">qty:${n.qty} × ₹${n.price.toFixed(2)}</div>
        </div>
        <span class="ci-sub">₹${sub}</span>
        <button class="ci-del" onclick="removeByIdDirect(${n.id})" title="Remove">×</button>
      </div>`;
    }).join('');
  }

  // Summary
  let total = 0, qty = 0;
  arr.forEach(n => { total += n.price * n.qty; qty += n.qty; });
  document.getElementById('sizeVal').textContent  = cart.size;
  document.getElementById('qtyVal').textContent   = qty;
  document.getElementById('totalVal').textContent = '₹' + total.toFixed(2);
}

// Seed data
(function seed() {
  const items = [
    ['Laptop', 55000, 1], ['Wireless Mouse', 850, 2], ['Keyboard', 1200, 1]
  ];
  items.forEach(([name, price, qty]) => {
    const node = new CartNode(nextId++, name, qty, price);
    cart.insertAtTail(node);
  });
  log(`<span class="ok">READY</span> Seeded 3 items. head:<span class="ptr">#${cart.head.id}</span>  tail:<span class="ptr">#${cart.tail.id}</span>`);
  render();
})();
</script>
</body>
</html>
